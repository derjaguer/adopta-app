<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdoptaPatitas</title>
    <!-- Tailwind y Firebase -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="p-6">
        <h1 class="text-3xl font-bold text-center text-orange-600">Bienvenido a AdoptaPatitas</h1>
        <p class="text-center mt-4">Cargando sistema de adopción...</p>
    </div>

<script>
    // Configuración (ya la tienes, solo asegúrate de que esté completa)
    const firebaseConfig = { /* ... tus datos ... */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    // Ruta a la colección
    const mascotasRef = db.collection('artifacts').doc('buscapatitas').collection('public').doc('data').collection('pets');

async function cargarMascotas() {
        const appDiv = document.getElementById('app');
        try {
            const snapshot = await mascotasRef.get();
            console.log("Total de mascotas encontradas:", snapshot.size); // Mira esto en la consola
            
            let html = '<h1 class="text-4xl font-black text-center text-orange-600 mb-10">🐾 AdoptaPatitas</h1>';
            html += '<div class="grid grid-cols-1 md:grid-cols-3 gap-8">';
            
            snapshot.forEach(doc => {
                const m = doc.data();
                // --- IMPRIME EL ESTADO EN LA CONSOLA ---
                console.log("Mascota:", m.nombre, "| Estado en BD:", m.estado);
                
                // Comparamos sin espacios ni mayúsculas extra por si acaso
                if (m.estado && m.estado.trim().toLowerCase() === 'adopcion') {
                    html += `
                        <div class="bg-white rounded-2xl shadow-lg hover:shadow-xl transition-all overflow-hidden border border-gray-100">
                            <img src="${m.fotos?.[0] || ''}" class="w-full h-56 object-cover">
                            <div class="p-5">
                                <h3 class="text-2xl font-bold text-gray-800">${m.nombre}</h3>
                                <p class="text-sm text-gray-500 mb-4">${m.especie} | ${m.zona}</p>
                                <button class="w-full bg-orange-500 text-white font-bold py-3 rounded-xl hover:bg-orange-600">Adoptar</button>
                            </div>
                        </div>
                    `;
                }
            });
            
            html += '</div>';
            appDiv.innerHTML = html;
        } catch (error) {
            console.error("Error detallado:", error);
        }
    }
    cargarMascotas();
</script>
</body>
</html>
