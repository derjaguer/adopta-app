<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdoptaPatitas</title>
    <!-- Tailwind y Firebase -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="p-6">
        <h1 class="text-3xl font-bold text-center text-orange-600">Bienvenido a AdoptaPatitas</h1>
        <p class="text-center mt-4">Cargando sistema de adopción...</p>
    </div>

<script>
    // Configuración de Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDkeh5WVeWi1yFTHGiCSLvz9aB8auhZtT8",
        authDomain: "buscapatutas.firebaseapp.com",
        projectId: "buscapatutas",
        storageBucket: "buscapatutas.firebasestorage.app",
        messagingSenderId: "61106039176",
        appId: "1:61106039176:web:266707c6c9fa2c5a1b723d",
        measurementId: "G-NS2EZKX6KN"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    // Ruta exacta a tu colección
    const mascotasRef = db.collection('artifacts').doc('buscapatitas').collection('public').doc('data').collection('pets');

    async function cargarMascotas() {
        const appDiv = document.getElementById('app');
        try {
            const snapshot = await mascotasRef.get();
            let html = '<h2 class="text-2xl font-bold mb-6 text-center">Nuestros Peludos en Adopción</h2>';
            html += '<div class="grid grid-cols-1 md:grid-cols-2 gap-6">';
            
            if (snapshot.empty) {
                html += '<p class="text-center col-span-2">No se encontraron mascotas en la base de datos.</p>';
            } else {
                snapshot.forEach(doc => {
                    const m = doc.data();
                    html += `
                        <div class="bg-white p-4 rounded-lg shadow border">
                            <img src="${m.fotos?.[0] || ''}" class="w-full h-48 object-cover rounded-md mb-4" alt="${m.nombre}">
                            <h3 class="text-xl font-bold">${m.nombre || 'Sin nombre'}</h3>
                            <p class="text-gray-600">${m.especie || ''} - ${m.zona || ''}</p>
                        </div>
                    `;
                });
            }
            
            html += '</div>';
            appDiv.innerHTML = html;
        } catch (error) {
            appDiv.innerHTML = `<p class="text-red-500">Error al cargar datos: ${error.message}</p>`;
            console.error("Error completo:", error);
        }
    }

    cargarMascotas();
</script>
</body>
</html>
